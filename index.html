<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Help in Turin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg:#f6f0df; --ink:#111; --muted:#555; --card:#fffaf0; --line:#111;
}
* { box-sizing:border-box; }
html, body { margin:0; font-family:Arial, system-ui, sans-serif; background:var(--bg); color:var(--ink); font-size:20px; }
button, input { font:inherit; }
.screen { display:none; min-height:100vh; padding:16px; }
.screen.active { display:block; }
.topbar {
  position:sticky; top:0; z-index:2000; background:rgba(246,240,223,.97);
  padding:10px; border-bottom:4px solid #111; display:flex; gap:10px; justify-content:space-between; align-items:center;
}
.smallbtn { border:4px solid #111; background:#fff; border-radius:18px; padding:12px 16px; font-weight:900; cursor:pointer; }
.hero { text-align:center; padding:24px 10px 12px; }
.hero h1 { font-size:clamp(34px, 7vw, 70px); margin:0 0 10px; font-weight:1000; }
.hero p { max-width:850px; margin:0 auto; color:#333; font-size:clamp(20px, 4vw, 30px); line-height:1.25; font-weight:700; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; max-width:1150px; margin:20px auto; }
.langBtn, .choiceBtn, .catBtn {
  border:5px solid #111; background:#fff; border-radius:30px; padding:22px 12px;
  min-height:230px; font-weight:1000; box-shadow:0 9px 0 #111; cursor:pointer; text-align:center;
}
.langBtn:active, .choiceBtn:active, .catBtn:active { transform:translateY(5px); box-shadow:0 4px 0 #111; }

.flagImg{
  width:140px;
  height:100px;
  object-fit:cover;
  border:5px solid #111;
  border-radius:18px;
  display:block;
  margin:0 auto 14px;
  box-shadow:0 5px 0 rgba(0,0,0,.25);
}

.icon { font-size:84px; display:block; line-height:1; margin-bottom:12px; }
.native { font-size:34px; display:block; font-weight:1000; }
.country { font-size:22px; color:#444; display:block; margin-top:10px; font-weight:900; }
.viewGrid { display:grid; grid-template-columns:1fr 1fr; gap:24px; max-width:820px; margin:24px auto; }
.choiceBtn { min-height:260px; }
.bigIcon { font-size:100px; display:block; }
.label { font-size:38px; display:block; margin-top:12px; }
.searchWrap { max-width:900px; margin:14px auto; }
.searchWrap input { width:100%; padding:18px; border:5px solid #111; border-radius:20px; background:#fff; font-size:25px; font-weight:800; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:20px; max-width:1250px; margin:20px auto; }
.card { background:var(--card); border:5px solid #111; border-radius:28px; padding:18px; box-shadow:0 7px 0 #111; }
.cardHead { display:flex; gap:14px; align-items:center; margin-bottom:12px; }
.cardIcon { font-size:62px; background:white; border:4px solid #111; border-radius:22px; width:100px; height:100px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.card h3 { margin:0; font-size:27px; line-height:1.1; }
.row { margin:12px 0; line-height:1.25; font-size:20px; }
.row b { display:block; font-size:15px; color:#333; text-transform:uppercase; letter-spacing:.05em; }
.actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.action { text-decoration:none; color:#111; border:4px solid #111; border-radius:18px; padding:15px 8px; background:#fff; font-weight:1000; text-align:center; }
.call { background:#d9ffd9; }
.maplink { background:#d8ebff; }
.mapShell { position:relative; max-width:1250px; margin:18px auto; }
#map { height:calc(100vh - 105px); width:100%; border:5px solid #111; border-radius:28px; z-index:1; background:#ddd; }
.mapOverlay {
  position:absolute; left:14px; right:14px; top:14px; z-index:1500; display:flex; gap:10px; overflow:auto;
  padding:10px; background:rgba(255,255,255,.97); border:4px solid #111; border-radius:22px;
}
.mapOverlay button { flex:0 0 auto; border:4px solid #111; border-radius:18px; padding:12px 16px; background:#fff; font-weight:1000; cursor:pointer; }
.mapOverlay button.activeFilter { background:#ffe08a; }
.leaflet-div-icon { background:transparent; border:0; }
.pin { font-size:35px; background:white; border:4px solid #111; border-radius:50%; width:60px; height:60px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 #111; }
.adminBox { max-width:900px; margin:22px auto; background:#fff; border:5px dashed #111; border-radius:28px; padding:22px; }
textarea { width:100%; min-height:230px; border:4px solid #111; border-radius:18px; padding:12px; }
.hiddenAdminHint { position:fixed; right:8px; bottom:8px; opacity:.22; z-index:2500; }
@media(max-width:700px) {
  body { font-size:18px; }
  .screen { padding:8px; }
  .viewGrid { grid-template-columns:1fr; }
  .choiceBtn { min-height:205px; }
  .grid { grid-template-columns:1fr 1fr; gap:12px; }
  .langBtn, .catBtn { min-height:145px; padding:14px 8px; }
  .flag { font-size:52px; }
  .icon { font-size:62px; }
  .native { font-size:22px; }
  .country { font-size:14px; }
  .label { font-size:32px; }
  .cards { grid-template-columns:1fr; }
  .topbar { gap:6px; }
  .smallbtn { padding:10px; font-size:16px; }
  #map { height:calc(100vh - 85px); }
  .mapOverlay { top:auto; bottom:14px; }
}
</style>
</head>
<body>

<section id="langScreen" class="screen active">
  <div class="hero">
    <h1>🆘 Help in Turin</h1>
    <p id="chooseText">Choose language</p>
  </div>
  <div id="langGrid" class="grid"></div>
</section>

<section id="homeScreen" class="screen">
  <div class="topbar">
    <button class="smallbtn" onclick="showScreen('langScreen')">🌍 <span data-t="change">Change language</span></button>
  </div>
  <div class="hero">
    <h1 data-t="hero">Help in Turin</h1>
    <p data-t="sub">Find food, shower, clothes, doctor and help.</p>
  </div>
  <h2 style="text-align:center;font-size:36px" data-t="viewfirst">Choose how to see</h2>
  <div class="viewGrid">
    <button class="choiceBtn" onclick="openMode('list')"><span class="bigIcon">📋</span><span class="label" data-t="list">List</span></button>
    <button class="choiceBtn" onclick="openMode('map')"><span class="bigIcon">🗺️</span><span class="label" data-t="map">Map</span></button>
  </div>
  <button class="hiddenAdminHint smallbtn" onclick="showScreen('adminScreen')">⚙️</button>
</section>

<section id="categoryScreen" class="screen">
  <div class="topbar">
    <button class="smallbtn" onclick="showScreen('homeScreen')">⬅️ <span data-t="back">Back</span></button>
    <button class="smallbtn" onclick="showScreen('langScreen')">🌍 <span data-t="change">Change language</span></button>
  </div>
  <div class="hero"><h1 data-t="need">What do you need?</h1></div>
  <div id="catGrid" class="grid"></div>
</section>

<section id="listScreen" class="screen">
  <div class="topbar">
    <button class="smallbtn" onclick="showScreen('categoryScreen')">⬅️ <span data-t="back">Back</span></button>
    <button class="smallbtn" onclick="showScreen('langScreen')">🌍 <span data-t="change">Change language</span></button>
  </div>
  <div class="searchWrap"><input id="searchInput" oninput="renderList()"></div>
  <div id="cards" class="cards"></div>
</section>

<section id="mapScreen" class="screen">
  <div class="topbar">
    <button class="smallbtn" onclick="showScreen('categoryScreen')">⬅️ <span data-t="back">Back</span></button>
    <button class="smallbtn" onclick="showScreen('langScreen')">🌍 <span data-t="change">Change language</span></button>
  </div>
  <div class="mapShell">
    <div id="mapFilters" class="mapOverlay"></div>
    <div id="map"></div>
  </div>
</section>

<section id="adminScreen" class="screen">
  <div class="topbar">
    <button class="smallbtn" onclick="showScreen('homeScreen')">⬅️ <span data-t="back">Back</span></button>
  </div>
  <div class="adminBox">
    <h1>Admin CSV upload</h1>
    <p>For operators only. Later you can protect or hide this route.</p>
    <input type="file" accept=".csv" onchange="loadCSV(event)">
    <h3>Example CSV</h3>

food,Example food place,"Via Roma 1, Torino",011000000,Monday to Friday,10:00-12:00,4 11,Warm meal</textarea>
  </div>
</section>

const ICONS = {"food": "🍲", "shower": "🚿", "clothes": "🧥", "health": "❤️‍🩹", "help": "🆘", "mental": "🧠", "all": "⭐"};
const CATS = ["food", "shower", "clothes", "health", "help", "mental", "all"];
let currentLang = localStorage.getItem("torino_help_lang") || "it";
let currentMode = "list";
let currentCat = "all";
let map = null;
let markers = [];

function t(k) { return (LANGS[currentLang] && LANGS[currentLang][k]) || LANGS.en[k] || k; }
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  applyLang();
  if (id === "mapScreen") setTimeout(initMap, 80);
}
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem("torino_help_lang", lang);
  applyLang();
  showScreen("homeScreen");
}
function applyLang() {
  document.documentElement.lang = currentLang;
  document.documentElement.dir = ["ar","ur","fa","ps"].includes(currentLang) ? "rtl" : "ltr";
  document.querySelectorAll("[data-t]").forEach(el => el.textContent = t(el.dataset.t));
  document.getElementById("chooseText").textContent = t("choose");
  const inp = document.getElementById("searchInput");
  if (inp) inp.placeholder = t("search");
  renderCategories();
  renderMapFilters();
  if (document.getElementById("listScreen").classList.contains("active")) renderList();
}
function renderLanguages() {
  const grid = document.getElementById("langGrid");
  grid.innerHTML = "";
  Object.entries(LANGS).forEach(([code, l]) => {
    const b = document.createElement("button");
    b.className = "langBtn";
    const flagMap = {
      "🇮🇹":"it","🇬🇧":"gb","🇫🇷":"fr","🇸🇩":"sd","🇰🇪":"ke","🇸🇴":"so",
      "🇪🇷":"er","🇳🇬":"ng","🇸🇳":"sn","🇦🇴":"ao","🇪🇹":"et",
      "🇵🇰":"pk","🇧🇩":"bd","🇦🇫":"af"
    };
    const cc = flagMap[l.flag] || "un";
    b.innerHTML = `<img class="flagImg" src="https://flagcdn.com/w160/${cc}.png" alt="${l.country} flag">
    <span class="native">${l.native}</span>
    <span class="country">${l.country}</span>`;
    b.onclick = () => setLang(code);
    grid.appendChild(b);
  });
}
function openMode(mode) {
  currentMode = mode;
  showScreen("categoryScreen");
}
function renderCategories() {
  const grid = document.getElementById("catGrid");
  if (!grid) return;
  grid.innerHTML = "";
  CATS.forEach(cat => {
    const b = document.createElement("button");
    b.className = "catBtn";
    b.innerHTML = `<span class="icon">${ICONS[cat]}</span><span class="label">${t(cat)}</span>`;
    b.onclick = () => {
      currentCat = cat;
      if (currentMode === "map") showScreen("mapScreen");
      else showScreen("listScreen");
    };
    grid.appendChild(b);
  });
}
function filtered() {
  const q = (document.getElementById("searchInput")?.value || "").toLowerCase().trim();
  return LOCATIONS.filter(x => {
    const catOk = currentCat === "all" || x.cat === currentCat;
    const qOk = !q || Object.values(x).join(" ").toLowerCase().includes(q);
    return catOk && qOk;
  });
}
function esc(s) { return String(s || "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function mapsUrl(address) { return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(address); }
function renderList() {
  const cards = document.getElementById("cards");
  cards.innerHTML = "";
  filtered().forEach(x => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="cardHead">
        <div class="cardIcon">${ICONS[x.cat] || "📍"}</div>
        <h3>${esc(x.name)}</h3>
      </div>
      <div class="row"><b>📍 ${t("address")}</b>${esc(x.address)}</div>
      <div class="row"><b>🧾 ${t("service")}</b>${esc(t(x.cat))} — ${esc(x.notes)}</div>
      <div class="row"><b>📅 ${t("days")}</b>${esc(x.days)}</div>
      <div class="row"><b>🕒 ${t("hours")}</b>${esc(x.hours)}</div>
      ${x.bus ? `<div class="row"><b>🚌 ${t("bus")}</b>${esc(x.bus)}</div>` : ""}
      <div class="actions">
        ${x.phone ? `<a class="action call" href="tel:${esc(x.phone)}">☎️ ${t("call")}</a>` : `<span></span>`}
        <a class="action maplink" target="_blank" href="${mapsUrl(x.address)}">🗺️ ${t("openmap")}</a>
      </div>
    `;
    cards.appendChild(div);
  });
}
function renderMapFilters() {
  const mf = document.getElementById("mapFilters");
  if (!mf) return;
  mf.innerHTML = "";
  CATS.forEach(cat => {
    const b = document.createElement("button");
    b.className = cat === currentCat ? "activeFilter" : "";
    b.innerHTML = `${ICONS[cat]} ${t(cat)}`;
    b.onclick = () => { currentCat = cat; renderMapFilters(); renderMarkers(); };
    mf.appendChild(b);
  });
}
function pseudoCoords(address, i) {
  let h = 0; for (let c of address) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  const lat = 45.0703 + (((h % 1000) / 1000) - .5) * 0.055;
  const lng = 7.6869 + ((((h/1000|0) % 1000) / 1000) - .5) * 0.075;
  return [lat, lng];
}
function initMap() {
  if (!map) {
    map = L.map("map").setView([45.0703, 7.6869], 13);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);
  }
  map.invalidateSize();
  renderMarkers();
}
function renderMarkers() {
  if (!map) return;
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  LOCATIONS.filter(x => currentCat === "all" || x.cat === currentCat).forEach((x, i) => {
    const coord = pseudoCoords(x.address, i);
    const icon = L.divIcon({
      html:`<div class="pin">${ICONS[x.cat] || "📍"}</div>`,
      className:"",
      iconSize:[60,60],
      iconAnchor:[30,30]
    });
    const m = L.marker(coord, {icon}).addTo(map);
    m.bindPopup(`<b>${esc(x.name)}</b><br>${esc(x.address)}<br><a target="_blank" href="${mapsUrl(x.address)}">${t("openmap")}</a>`);
    markers.push(m);
  });
}
function showAdmin() { showScreen("adminScreen"); }
function loadCSV(e) {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = () => alert("CSV loaded in browser preview. For production, save it to the data file.");
  reader.readAsText(f);
}

renderLanguages();
applyLang();
</script>
