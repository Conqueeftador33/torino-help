var ICON={"food": "🍲", "shower": "🚿", "clothes": "🧥", "health": "❤️‍🩹", "help": "🆘", "mental": "🧠", "all": "⭐"};
var CATS=["food", "shower", "clothes", "health", "help", "mental", "all"];
var lang=localStorage.getItem("th_lang")||"en",mode="list",cat="all",map=null,marks=[];
function tr(k){return (UI[lang]&&UI[lang][k])||(UI.en&&UI.en[k])||k}
function dt(k){return (DETAIL[lang]&&DETAIL[lang][k])||(DETAIL.en&&DETAIL.en[k])||k}
function setLang(l){lang=l;localStorage.setItem("th_lang",l);apply();show("home")}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");apply();if(id==="mapS")setTimeout(initMap,100)}
function apply(){document.documentElement.dir=["ar","ur","fa","ps"].includes(lang)?"rtl":"ltr";document.getElementById("choose").textContent=tr("choose");document.querySelectorAll("[data-k]").forEach(e=>e.textContent=tr(e.dataset.k));renderCats();if(document.getElementById("list").classList.contains("active"))renderList()}
function renderCats(){var g=document.getElementById("catGrid");if(!g)return;g.innerHTML="";CATS.forEach(c=>{var b=document.createElement("button");b.className="catBtn";b.innerHTML='<span class="icon">'+ICON[c]+'</span><span class="label">'+tr(c)+'</span>';b.onclick=function(){cat=c;if(mode==="map")show("mapS");else show("list")};g.appendChild(b)})}
function mapsUrl(a){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(a)}
function visible(){return LOC.filter(x=>cat==="all"||x.cat===cat)}
function renderList(){var c=document.getElementById("cards");c.innerHTML="";visible().forEach(x=>{var d=document.createElement("div");d.className="card";d.innerHTML='<h3>'+ICON[x.cat]+' '+x.name+'</h3><div class="row"><b>📍 '+tr("address")+'</b>'+x.address+'</div><div class="row"><b>🧾 '+tr("service")+'</b>'+tr(x.cat)+' — '+dt(x.note)+'</div><div class="row"><b>📅 '+tr("days")+'</b>'+dt(x.days)+'</div><div class="row"><b>🕒 '+tr("hours")+'</b>'+dt(x.hours)+'</div>'+(x.bus?'<div class="row"><b>🚌 '+tr("bus")+'</b>'+x.bus+'</div>':'')+'<div class="actions">'+(x.phone?'<a class="action call" href="tel:'+x.phone+'">☎️ '+tr("call")+'</a>':'<span></span>')+'<a class="action" target="_blank" href="'+mapsUrl(x.address)+'">🗺️ '+tr("openmap")+'</a></div>';c.appendChild(d)})}
function initMap(){if(!window.L)return;if(!map){map=L.map("map").setView([45.0703,7.6869],12);L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map)}map.invalidateSize();renderMapFilter();renderMarks()}
function renderMapFilter(){var f=document.getElementById("mapFilter");f.innerHTML="";CATS.forEach(c=>{var b=document.createElement("button");b.innerHTML=ICON[c]+" "+tr(c);b.onclick=function(){cat=c;renderMarks();renderMapFilter()};f.appendChild(b)})}
function renderMarks(){if(!map)return;marks.forEach(m=>map.removeLayer(m));marks=[];visible().forEach((x,i)=>{var ic=L.divIcon({html:'<div class="pin">'+ICON[x.cat]+'</div>',iconSize:[60,60],iconAnchor:[30,30]});var m=L.marker([x.lat,x.lng],{icon:ic}).addTo(map);m.bindPopup('<b>'+x.name+'</b><br><b>📍 '+tr("address")+':</b> '+x.address+'<br><b>🧾 '+tr("service")+':</b> '+tr(x.cat)+' — '+dt(x.note)+'<br><b>📅 '+tr("days")+':</b> '+dt(x.days)+'<br><b>🕒 '+tr("hours")+':</b> '+dt(x.hours)+'<br><a target="_blank" href="'+mapsUrl(x.address)+'">🗺️ '+tr("openmap")+'</a>');marks.push(m)})}
apply();
